# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g mouse on
set -g set-titles on
set -g set-titles-string "#h ❐ #S ● #I #W"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# -- keybindings ---------------------------------------------------------------

# split panes retain current path
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -- display -------------------------------------------------------------------

# pane borders (zenburn)
set -g pane-border-style "fg=#4F4F4F"
set -g pane-active-border-style "fg=#7F9F7F"

# highlight focused pane
set -g window-style "bg=default"
set -g window-active-style "bg=#3F3F3F"

# messages
set -g message-style "fg=#DCDCCC,bg=#4F4F4F,bold"
set -g message-command-style "fg=#F0DFAF,bg=#4F4F4F,bold"

# -- activity ------------------------------------------------------------------

set -g monitor-activity on
set -g activity-action none

# -- status bar ----------------------------------------------------------------

set -g status-style "fg=#8a8a8a,bg=#2E2E2E"
set -g status-interval 10

# left: session name
set -g status-left-length 40
set -g status-left "#[fg=#2E2E2E,bg=#7F9F7F,bold] ❐ #S #[default] "

# right: time, date, user@host
set -g status-right-length 80
set -g status-right " %R | %d %b #[fg=#DCDCCC,bg=#4F4F4F,bold] #(whoami)@#h "

# window tabs
setw -g window-status-format " #I #W "
setw -g window-status-current-format "#[fg=#DCDCCC,bg=#5F5F5F,bold] #I #W "
setw -g window-status-last-style "fg=#8CD0D3,bg=#3F3F3F"
setw -g window-status-activity-style "underscore"

# -- vim-tmux-navigator (inline) -----------------------------------------------

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
