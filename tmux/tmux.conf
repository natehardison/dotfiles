# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g mouse on
set -g set-titles on
set -g set-titles-string "#h ❐ #S ● #I #W"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# -- keybindings ---------------------------------------------------------------

# split panes retain current path
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -- display -------------------------------------------------------------------

# pane borders
set -g pane-border-style "fg=#303030"
set -g pane-active-border-style "fg=#00afff"

# highlight focused pane
set -g window-style "bg=default"
set -g window-active-style "bg=#303030"

# messages
set -g message-style "fg=#080808,bg=#ffff00,bold"
set -g message-command-style "fg=#ffff00,bg=#080808,bold"

# -- status bar ----------------------------------------------------------------

set -g status-style "fg=#8a8a8a,bg=#080808"
set -g status-interval 10

# left: session name
set -g status-left-length 40
set -g status-left "#[fg=#080808,bg=#ffff00,bold] ❐ #S #[default] "

# right: time, date, user@host
set -g status-right-length 80
set -g status-right " %R | %d %b #[fg=#e4e4e4,bg=#d70000,bold] #(whoami)@#h "

# window tabs
setw -g window-status-format " #I #W "
setw -g window-status-current-format "#[fg=#080808,bg=#00afff,bold] #I #W "
setw -g window-status-last-style "fg=#00afff,bg=#303030"
setw -g window-status-activity-style "underscore"

# -- plugins -------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
